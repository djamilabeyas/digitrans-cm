# ============================================================
# DIGITRANS-CM – Pipeline CI
# Déclenché sur chaque push/PR vers main et develop
# ============================================================
name: CI – Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: digitranscr.azurecr.io
  IMAGE_NAME: crm-api
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------------------------
  # 1. Analyse de sécurité statique (SAST)
  # ------------------------------------------------------------------
  sast:
    name: SAST – Analyse sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Installer Bandit
        run: pip install bandit

      - name: Bandit – analyse Python
        run: |
          bandit -r services/crm-api/app \
            -ll -ii \
            --exclude services/crm-api/app/tests \
            -f txt \
            || true   # non bloquant en phase de développement

      - name: Trivy – scan dépendances Python
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "services/crm-api"
          format: "table"
          severity: "CRITICAL"
          exit-code: "0"          # non bloquant – informatif

  # ------------------------------------------------------------------
  # 2. Tests unitaires et d'intégration
  # ------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "services/crm-api/requirements.txt"

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r services/crm-api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Vérifier la syntaxe Python
        run: |
          python -m py_compile services/crm-api/app/main.py
          python -m py_compile services/crm-api/app/core/config.py
          python -m py_compile services/crm-api/app/core/security.py
          python -m py_compile services/crm-api/app/routers/clients.py
          python -m py_compile services/crm-api/app/routers/commandes.py
          python -m py_compile services/crm-api/app/routers/sync.py
          echo "Syntaxe Python OK"

  # ------------------------------------------------------------------
  # 3. Build de l'image Docker
  # ------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: services/crm-api
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy – scan image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          severity: "CRITICAL"
          exit-code: "0"          # non bloquant

  # ------------------------------------------------------------------
  # 4. Validation Terraform (syntaxe uniquement)
  # ------------------------------------------------------------------
  terraform-validate:
    name: Valider avec Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt check – networking
        run: terraform fmt -check
        working-directory: infrastructure/terraform/modules/networking
        continue-on-error: true

      - name: Terraform fmt check – security
        run: terraform fmt -check
        working-directory: infrastructure/terraform/modules/security
        continue-on-error: true

      - name: Terraform validate – networking
        working-directory: infrastructure/terraform/modules/networking
        run: |
          terraform init -backend=false
          terraform validate
        continue-on-error: true

      - name: Terraform validate – compute
        working-directory: infrastructure/terraform/modules/compute
        run: |
          terraform init -backend=false
          terraform validate
        continue-on-error: true

      - name: Résumé validation
        run: echo "Validation Terraform terminée (sans credentials cloud)"
