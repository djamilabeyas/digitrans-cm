# Azure Key Vault CSI Secret Provider – injecte les secrets sans variables d'env en clair
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: digitrans-keyvault
  namespace: digitrans
spec:
  provider: azure
  secretObjects:
    - secretName: crm-db-secret
      type: Opaque
      data:
        - objectName: crm-db-host
          key: host
        - objectName: crm-db-username
          key: username
        - objectName: crm-db-password
          key: password
    - secretName: redis-secret
      type: Opaque
      data:
        - objectName: redis-host
          key: host
        - objectName: redis-password
          key: password
    - secretName: crm-jwt-secret
      type: Opaque
      data:
        - objectName: crm-jwt-private-key
          key: private_key
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${AZURE_CLIENT_ID}"
    keyvaultName: "digitrans-cm-prod-kv"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: crm-db-host
          objectType: secret
          objectVersion: ""
        - |
          objectName: crm-db-username
          objectType: secret
          objectVersion: ""
        - |
          objectName: crm-db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-host
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: crm-jwt-private-key
          objectType: secret
          objectVersion: ""
    tenantId: "${AZURE_TENANT_ID}"
